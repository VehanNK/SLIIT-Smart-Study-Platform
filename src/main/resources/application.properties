# A/B Testing Configuration (disabled by default; enable and set variant to test)
# Options: default (disabled), variant-a (conservative), variant-b (aggressive), variant-c (recency-focused)
ab-testing.enabled=false
ab-testing.variant=default

# Variant A Weights (Conservative: prioritizes rating quality)
ab-testing.variant-a.weight-rating=4.0
ab-testing.variant-a.weight-downloads=1.5
ab-testing.variant-a.weight-program-match=8.0
ab-testing.variant-a.weight-intake-proximity=4.0
ab-testing.variant-a.weight-recency=0.5

# Variant B Weights (Aggressive: prioritizes program match and downloads)
